<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>   
<title>Landing Page Bootstrap</title>

<style>
  .carousel-item {
    background-color: #ffcf3f; 
    padding: 20px;
  }

  .carousel-item img {
    max-height: 400px;
    object-fit: contain;
  }

  body {
    background-color: #fbe5bc;
  }
</style>

</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
            Dropdown
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Action</a></li>
            <li><a class="dropdown-item" href="#">Another action</a></li>
          </ul>
        </li>
      </ul>
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

<h1 class="text-center fs-1 text-warning mt-3">🐶</h1>

<div class="container mt-4">

  <div id="carouselExampleRide" class="carousel slide" data-bs-ride="true">
    <div class="carousel-inner rounded-3">

      <div class="carousel-item active text-center">
        <img src="https://i.pinimg.com/736x/6a/05/94/6a059476dfa01866b90a7fa575a8e3e2.jpg" class="d-block mx-auto w-75" alt="">
      </div>

      <div class="carousel-item text-center">
        <img src="https://i.pinimg.com/736x/56/98/6a/56986a6df8d4144860f8ceb719fa7b12.jpg" class="d-block mx-auto w-75" alt="">
      </div>

      <div class="carousel-item text-center">
        <img src="https://i.pinimg.com/736x/3b/60/17/3b6017db2c38a74c86608cb2ffec0f82.jpg" class="d-block mx-auto w-75" alt="">
      </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleRide" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleRide" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>
</div>

<div class="container text-center mt-5">
  <h2 class="fw-bold">Bem-vindo</h2>
  <p class="text-muted">
    Um site simples desenvolvido com Bootstrap.
  </p>
  <button class="btn btn-warning">Saiba Mais</button>
</div>

<footer class="text-center mt-5 p-3 border-top">
  <p class="mb-0 text-muted">© 2026 melzinha</p>
</footer>

</body>
</html>
